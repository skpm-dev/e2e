name: E2E

on:
  workflow_dispatch:
  repository_dispatch:
    types: [run-e2e]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: skpm-dev/cli
          token: ${{ secrets.REGISTRY_GITHUB_TOKEN }}
          path: cli-src

      - uses: actions/checkout@v4
        with:
          repository: skpm-dev/registry
          token: ${{ secrets.REGISTRY_GITHUB_TOKEN }}
          path: registry-src

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download SKPM.jar from plugin CI
        run: |
          mkdir -p server-data/plugins
          RUN_ID="${{ github.event.client_payload.plugin_run_id }}"
          if [ -n "$RUN_ID" ]; then
            echo "Downloading SKPM.jar from plugin run $RUN_ID"
            gh run download "$RUN_ID" --repo skpm-dev/plugin --name SKPM --dir server-data/plugins
          else
            echo "No plugin_run_id in payload — fetching from latest successful CI run on main"
            LATEST=$(gh run list --repo skpm-dev/plugin --branch main --status success --workflow ci.yml --limit 1 --json databaseId --jq '.[0].databaseId')
            if [ -z "$LATEST" ] || [ "$LATEST" = "null" ]; then
              echo "No artifact found — Go test will fall back to latest GitHub release"
            else
              echo "Downloading SKPM.jar from run $LATEST"
              gh run download "$LATEST" --repo skpm-dev/plugin --name SKPM --dir server-data/plugins
            fi
          fi
        env:
          GH_TOKEN: ${{ secrets.REGISTRY_GITHUB_TOKEN }}

      - name: Run e2e tests
        run: go test -v -timeout 20m ./...
        env:
          SKPM_GITHUB_TOKEN: ${{ secrets.SKPM_GITHUB_TOKEN }}
          REGISTRY_GITHUB_TOKEN: ${{ secrets.REGISTRY_GITHUB_TOKEN }}
          SKPM_TEST_SPIGOT_RESOURCE: ${{ secrets.SKPM_TEST_SPIGOT_RESOURCE }}
          CLI_SRC_DIR: ${{ github.workspace }}/cli-src
          REGISTRY_SRC_DIR: ${{ github.workspace }}/registry-src
